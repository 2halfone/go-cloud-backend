services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - auth-service
      - user-service
    networks:
      - microservices-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Database per i log di autenticazione ---
  auth-db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: auth_admin
      POSTGRES_PASSWORD: auth_password
      POSTGRES_DB: auth_logs_db
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    networks:
      - microservices-net

  # --- Auth Service (aggiornato con database) ---
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      # stringa di connessione al nuovo PostgreSQL
      AUTH_DATABASE_URL: postgres://auth_admin:auth_password@auth-db:5432/auth_logs_db?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - auth-db
    networks:
      - microservices-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Database per i dati degli utenti ---
  user-db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: user_password
      POSTGRES_DB: users_db
    volumes:
      - user_db_data:/var/lib/postgresql/data
    networks:
      - microservices-net
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      # stringa di connessione al nuovo PostgreSQL
      USER_DATABASE_URL: postgres://user_admin:user_password@user-db:5432/users_db?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - user-db
    networks:
      - microservices-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  # --- Monitoring Service (Admin-only Grafana access) ---
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
    networks:
      - microservices-net
    restart: unless-stopped

  # --- MONITORING SERVICES ---
  
  # Monitoring Service (Admin JWT-protected Grafana access)
  monitoring-service:
    build:
      context: ./monitoring-service
      dockerfile: Dockerfile
    container_name: go-cloud-backend_monitoring-service_1
    ports:
      - "8085:8085"
    environment:
      - GIN_MODE=release
      - GRAFANA_URL=http://grafana:3000
    networks:
      - app-network
    depends_on:
      - grafana
      - prometheus
    # FIX: Usa wget invece di curl
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8085/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: go-cloud-backend_prometheus_1
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - microservices-net
    restart: unless-stopped

  # Grafana - Visualization Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: go-cloud-backend_grafana_1
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource,grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - microservices-net
    depends_on:
      - prometheus
    restart: unless-stopped

  # PostgreSQL Exporter - Database Metrics
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: go-cloud-backend_postgres-exporter_1
    environment:
      DATA_SOURCE_NAME: "postgresql://auth_admin:auth_password@auth-db:5432/auth_logs_db?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - microservices-net
    depends_on:
      - auth-db
    restart: unless-stopped

networks:
  microservices-net:
    driver: bridge

volumes:
  auth_db_data:
    driver: local
  user_db_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
